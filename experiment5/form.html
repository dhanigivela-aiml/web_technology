<!DOCTYPE html>

<html>

<head>

<title>GET vs POST Demo</title>



<style>



body{

    font-family: Arial, sans-serif;

    background: linear-gradient(to right, #74ebd5, #ACB6E5);

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;

}



.container{

    background:white;

    padding:30px;

    border-radius:10px;

    box-shadow:0 4px 15px rgba(0,0,0,0.2);

    width:350px;

}



h2{

    text-align:center;

    margin-bottom:15px;

}



input[type="text"]{

    width:100%;

    padding:10px;

    margin:8px 0;

    border-radius:5px;

    border:1px solid #ccc;

}



button{

    width:100%;

    padding:10px;

    margin-top:10px;

    border:none;

    border-radius:5px;

    background:#4CAF50;

    color:white;

    font-size:15px;

    cursor:pointer;

}



button:hover{

    background:#45a049;

}



.section{

    margin-bottom:25px;

}



</style>



</head>



<body>



<div class="container">



<div class="section">



<h2>GET Method</h2>



<form action="GetPostServlet" method="get">



<input type="text" name="name" placeholder="Enter your name">



<input type="text" name="email" placeholder="Enter your email">



<button type="submit">Submit using GET</button>



</form>



</div>



<div class="section">



<h2>POST Method</h2>



<form action="GetPostServlet" method="post">



<input type="text" name="name" placeholder="Enter your name">



<input type="text" name="email" placeholder="Enter your email">



<button type="submit">Submit using POST</button>



</form>



</div>



</div>



</body>

</html>
